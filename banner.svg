<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="180" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="760" height="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="0" y="178" width="760" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Chain links icon -->
  <g transform="translate(90, 90)" filter="url(#glow)">
    <!-- Terminal prompt -->
    <text x="-30" y="-25" font-family="'Courier New', monospace" font-size="16" fill="#3fb950" opacity="0.7">$_</text>
    <!-- Chain links -->
    <rect x="-20" y="-8" width="22" height="14" rx="7" fill="none" stroke="#3fb950" stroke-width="2"/>
    <rect x="-6" y="-8" width="22" height="14" rx="7" fill="none" stroke="#3fb950" stroke-width="2"/>
    <rect x="8" y="-8" width="22" height="14" rx="7" fill="none" stroke="#3fb950" stroke-width="2"/>
    <!-- Arrow pointing right -->
    <line x1="-15" y1="25" x2="25" y2="25" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <polyline points="18,20 25,25 18,30" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Accent divider -->
  <line x1="155" y1="40" x2="155" y2="145" stroke="#3fb950" stroke-width="1" opacity="0.2"/>

  <!-- Title -->
  <text x="170" y="68" font-family="'Courier New', Courier, monospace" font-size="30" font-weight="bold" fill="#3fb950" filter="url(#glow)">ShellChain</text>

  <!-- Subtitle -->
  <text x="172" y="95" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">Expect-Based SSH + SU Command Chaining</text>

  <!-- Description -->
  <text x="172" y="120" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">TTY simulation  ·  Lateral movement  ·  MCP automation  ·  CI/CD</text>

  <!-- Badges -->
  <g font-family="'Courier New', Courier, monospace" font-size="9.5" font-weight="700">
    <rect x="172" y="134" width="52" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="198" y="146" fill="#3fb950" text-anchor="middle">expect</text>
    <rect x="230" y="134" width="40" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="250" y="146" fill="#6b7280" text-anchor="middle">SSH</text>
    <rect x="276" y="134" width="52" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="302" y="146" fill="#6b7280" text-anchor="middle">pentest</text>
  </g>

  <!-- Author -->
  <text x="172" y="166" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">SkyzFallin</text>
</svg>
